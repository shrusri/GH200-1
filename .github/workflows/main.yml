name: GH-200 CoHack

on: push

jobs:
  hello-world:  
    runs-on: ubuntu-latest
    steps:
      - name: Say Hello
        run: echo "Hello from GH-200!!!" 

      - name: copy code into runner
        uses: actions/checkout@v6

      - name: List files
        run: ls -la

      - name: Generate ASCII art
        run: |
          sudo apt-get install -y figlet
          figlet "GH-200 CoHack"
          echo "----------------------"
          figlet -f slant "GitHub Actions"
          echo "ASCII art generated"
    
